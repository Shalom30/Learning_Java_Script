<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>ROCK PAPER SCISSORS</h1>
    <button onclick="
    playGame('rock');
    ">Rock</button>
    
    
    <button onclick="
    playGame('paper');
    ">Paper</button>
    
    
    <button onclick="
    playGame('scissors');
    ">Scissors</button>

    <button onclick="
    score.wins = 0;
    score.losses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    ">Reset Score</button>


    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };
    

        function pickComputerMove() {
            let computerMove = '';

            const randomNumber = Math.random()
            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove ='rock';
            }
            else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'paper';
            }
            else {
                computerMove = 'scissors';
            }
            
            
            return computerMove;
        }
        
        function playGame(playerMove) {
            let result = '';

            const computerMove = pickComputerMove();

            if (playerMove === 'rock') {
                if (computerMove === 'rock') {
                    result = 'tie!';
                }
                else if (computerMove === 'paper') {
                    result = 'you lose!';
                }
                else {
                    result = 'you win!';
                }
            }
            else if (playerMove === 'paper') {
                if (computerMove === 'rock') {
                    result = 'you win!';
                }
                else if (computerMove === 'paper') {
                    result = 'tie!';
                }
                else {
                    result = 'you lose!';
                }
            }
            else {
                if (computerMove === 'rock') {
                    result = 'you lose!';
                }
                else if (computerMove === 'paper') {
                    result = 'you win!';
                }
                else {
                    result = 'tie!';
                }
            }
            
            if (result === 'you win!') {
                score.wins += 1;
            }
            else if (result === 'you lose!') {
                score.losses += 1;
            }
            else {
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));

            alert(`You picked ${playerMove}, Computer chose ${computerMove}, ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
        }
    </script>
</body>
</html>
