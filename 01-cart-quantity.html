<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Quantity</title>
</head>
<body>
    <h1>Cart Quantity</h1>
    <button onclick="
    console.log(`Cart quantity: ${cartQuantity}`)
    ">Show Quantity</button>
    <button onclick="
    console.log(`Cart quantity: ${cartQuantity += 1}`)">Add to Cart</button>
    <button onclick="
    console.log(`Cart Quantity: ${cartQuantity += 2}`)">+2</button>
    <button onclick="
    console.log(`Cart Quantity: ${cartQuantity += 3}`)
    ">+3</button>
    <button onclick="
    console.log(`Cart Quantity: ${cartQuantity = 0}\nCart Was Reset`)
    ">Reset Cart</button>
    
    <script>
        let cartQuantity = 0;
    </script>
</body>
</html>
