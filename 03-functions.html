<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>ROCK PAPER SCISSORS</h1>
    <button onclick="
    playGame('rock');
    ">Rock</button>
    
    
    <button onclick="
    playGame('paper');
    ">Paper</button>
    
    
    <button onclick="
    playGame('scissors');
    ">Scissors</button>

    <script>
        function pickComputerMove() {
            let computerMove = '';

            const randomNumber = Math.random()
            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove ='rock';
            }
            else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'paper';
            }
            else {
                computerMove = 'scissors';
            }
            
            
            return computerMove;
        }
        
        function playGame(playerMove) {
            let result = '';

            const computerMove = pickComputerMove();

            if (playerMove === 'rock') {
                if (computerMove === 'rock') {
                    result = 'tie!';
                }
                else if (computerMove === 'paper') {
                    result = 'you lose!';
                }
                else {
                    result = 'you win!';
                }
            }
            else if (playerMove === 'paper') {
                if (computerMove === 'rock') {
                    result = 'you win!';
                }
                else if (computerMove === 'paper') {
                    result = 'tie!';
                }
                else {
                    result = 'you lose!';
                }
            }
            else {
                if (computerMove === 'rock') {
                    result = 'you lose!';
                }
                else if (computerMove === 'paper') {
                    result = 'you win!';
                }
                else {
                    result = 'tie!';
                }
            }
            
            alert(`You picked ${playerMove}, Computer chose ${computerMove}, ${result}`);
        }
    </script>
</body>
</html>
